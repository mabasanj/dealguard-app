services:
  - type: web
    name: dealguard-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci ; npx prisma generate ; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: dealguard-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: STELLAR_HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK
        value: TESTNET
      - key: STELLAR_NETWORK_PASSPHRASE
        value: Test SDF Network ; September 2015
      - key: STELLAR_APP_SECRET_KEY
        sync: false
      - key: STELLAR_APP_PUBLIC_KEY
        sync: false
      - key: SOROBAN_ESCROW_CONTRACT_ID
        sync: false

  - type: web
    name: dealguard-frontend
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm ci ; npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false

databases:
  - name: dealguard-db
    plan: free
    databaseName: dealguard
    user: dealguard_user
