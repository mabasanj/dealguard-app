name: Soroban Contract Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'soroban/**'
  pull_request:
    paths:
      - 'soroban/**'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy to network'
        required: false
        default: 'testnet'
        type: choice
        options:
          - none
          - testnet
          - mainnet

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target != 'none')
    steps:
      - name: Validate testnet secret
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'testnet')
        env:
          STELLAR_TESTNET_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: |
          if [ -z "$STELLAR_TESTNET_SECRET_KEY" ]; then
            echo "Missing required secret: STELLAR_TESTNET_SECRET_KEY"
            exit 1
          fi
          if ! echo "$STELLAR_TESTNET_SECRET_KEY" | grep -Eq '^S[A-Z2-7]{55}$'; then
            echo "Invalid STELLAR_TESTNET_SECRET_KEY format. Expected StrKey secret seed (starts with S, length 56)."
            exit 1
          fi

      - name: Validate mainnet secret
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'mainnet')
        env:
          STELLAR_MAINNET_SECRET_KEY: ${{ secrets.STELLAR_MAINNET_SECRET_KEY }}
        run: |
          if [ -z "$STELLAR_MAINNET_SECRET_KEY" ]; then
            echo "Missing required secret: STELLAR_MAINNET_SECRET_KEY"
            exit 1
          fi
          if ! echo "$STELLAR_MAINNET_SECRET_KEY" | grep -Eq '^S[A-Z2-7]{55}$'; then
            echo "Invalid STELLAR_MAINNET_SECRET_KEY format. Expected StrKey secret seed (starts with S, length 56)."
            exit 1
          fi

  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soroban/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('soroban/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        run: cargo test --manifest-path soroban/Cargo.toml --workspace
        
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Install Stellar CLI
        run: |
          STELLAR_CLI_VERSION="26.0.0"
          curl -Lo stellar.tar.gz \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf stellar.tar.gz -C /usr/local/bin stellar
          stellar --version

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soroban/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('soroban/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - name: Build release WASM
        working-directory: soroban
        run: stellar contract build

      - name: List WASM artifacts
        run: find soroban/target -name "*.wasm" | xargs ls -lh

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: dealguard-escrow-wasm
          path: soroban/target/wasm32v1-none/release/*.wasm
          retention-days: 30

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [build, validate-secrets]
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'testnet'))
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Stellar CLI
        run: |
          STELLAR_CLI_VERSION="26.0.0"
          curl -Lo stellar.tar.gz \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf stellar.tar.gz -C /usr/local/bin stellar
          stellar --version

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: dealguard-escrow-wasm
          path: wasm/

      - name: Deploy contract to testnet
        id: deploy
        env:
          STELLAR_TESTNET_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: |
          set -uo pipefail
          WASM_FILE=$(find wasm/ -name "*.wasm" | head -1)
          echo "Deploying $WASM_FILE to testnet..."
          DEPLOY_STATUS=0
          DEPLOY_OUTPUT=$(stellar contract deploy \
            --wasm "$WASM_FILE" \
            --source-account "$STELLAR_TESTNET_SECRET_KEY" \
            --network testnet \
            2>&1) || DEPLOY_STATUS=$?
          echo "$DEPLOY_OUTPUT"
          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "Contract deploy command failed with exit code $DEPLOY_STATUS"
            exit "$DEPLOY_STATUS"
          fi
          CONTRACT_ID=$(echo "$DEPLOY_OUTPUT" | grep -oE 'C[A-Z0-9]{55}' | head -1 || true)
          if [ -z "$CONTRACT_ID" ]; then
            echo "Failed to parse contract ID from deploy output"
            exit 1
          fi
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract ID: $CONTRACT_ID"

      - name: Print deployment summary
        run: |
          echo "## Testnet Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Contract ID**: \`${{ steps.deploy.outputs.contract_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Network**: Testnet" >> $GITHUB_STEP_SUMMARY
          echo "- **Explorer**: https://stellar.expert/explorer/testnet/contract/${{ steps.deploy.outputs.contract_id }}" >> $GITHUB_STEP_SUMMARY

  deploy-mainnet:
    name: Deploy to Mainnet
    runs-on: ubuntu-latest
    needs: [build, validate-secrets]
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_target == 'mainnet'
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Install Stellar CLI
        run: |
          STELLAR_CLI_VERSION="26.0.0"
          curl -Lo stellar.tar.gz \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf stellar.tar.gz -C /usr/local/bin stellar
          stellar --version

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: dealguard-escrow-wasm
          path: wasm/

      - name: Deploy contract to mainnet
        id: deploy
        env:
          STELLAR_MAINNET_SECRET_KEY: ${{ secrets.STELLAR_MAINNET_SECRET_KEY }}
          STELLAR_RPC_URL: https://mainnet.sorobanrpc.com
        run: |
          set -uo pipefail
          WASM_FILE=$(find wasm/ -name "*.wasm" | head -1)
          echo "Deploying $WASM_FILE to mainnet..."
          DEPLOY_STATUS=0
          DEPLOY_OUTPUT=$(stellar contract deploy \
            --wasm "$WASM_FILE" \
            --source-account "$STELLAR_MAINNET_SECRET_KEY" \
            --network mainnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "Public Global Stellar Network ; September 2015" \
            2>&1) || DEPLOY_STATUS=$?
          echo "$DEPLOY_OUTPUT"
          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "Contract deploy command failed with exit code $DEPLOY_STATUS"
            exit "$DEPLOY_STATUS"
          fi
          CONTRACT_ID=$(echo "$DEPLOY_OUTPUT" | grep -oE 'C[A-Z0-9]{55}' | head -1 || true)
          if [ -z "$CONTRACT_ID" ]; then
            echo "Failed to parse contract ID from deploy output"
            exit 1
          fi
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed contract ID: $CONTRACT_ID"

      - name: Print deployment summary
        run: |
          echo "## Mainnet Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Contract ID**: \`${{ steps.deploy.outputs.contract_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Network**: Public Mainnet" >> $GITHUB_STEP_SUMMARY
          echo "- **Explorer**: https://stellar.expert/explorer/public/contract/${{ steps.deploy.outputs.contract_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Update \`SOROBAN_ESCROW_CONTRACT_ID\` in your environment variables." >> $GITHUB_STEP_SUMMARY
